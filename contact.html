<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Mike Muller</title>
  <meta name="description" content="Get in touch with Mike Muller — Shopify Developer." />
  <script>
    (function() {
      var prefersDark = false;
      try { prefersDark = localStorage.getItem('theme') === 'dark'; } catch (e) {}
      if (!prefersDark) document.documentElement.setAttribute('data-theme', 'light');
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="header"></div>

  <main>
    <section class="page-header">
      <div class="container">
        <span class="eyebrow">Contact Info</span>
        <h1>Let's Get in Touch</h1> 
      </div>
    </section>

    <section class="section" style="padding-top: 40px;">
      <div class="container contact-grid">
        <div class="contact-info reveal">
          <p>Shopify developer focused on your store's success. Send me a quick message and I'll get back within 24-48 hours.</p>

          <div class="contact-detail">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <span>Email: mike@mike-muller.dev</span>
          </div>   
        </div>

        <form class="contact-form reveal" novalidate>
          <div class="form-row">
            <label for="name">Name</label>
            <input id="name" name="name" type="text" placeholder="Your name" required />
          </div>
          <div class="form-row">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="contact@business.com" required />
          </div>
          <div class="form-row">
            <label for="service">What do you need?</label>
            <select id="service" name="service">
              <option value="">Choose a service</option>
              <option>Shopify Store Setup</option>
              <option>Theme Customizations</option>
              <option>Ongoing Shopify Support</option>
              <option>Other</option>
            </select>
          </div>
          <div class="form-row">
            <label for="message">Project Needs</label>
            <textarea id="message" name="message" placeholder="Talk about your store, goals, and timeline." required></textarea>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">Send message →</button>
        </form>
      </div>
    </section>
  </main>

  <div id="footer"></div>

  <script src="js/includes.js"></script>
</body>
</html>
